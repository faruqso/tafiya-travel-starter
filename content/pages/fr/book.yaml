slug: book
title: Réserver un voyage
description: Demandez une réservation pour des destinations, hôtels ou vols sur tafiya.
sections:
  - discriminant: hero
    value:
      variant: compact
      eyebrow: Réserver
      headline: Commencez votre réservation
      subheadline: Choisissez votre voyage, vos dates et envoyez une demande — notre équipe confirme la disponibilité sous un jour ouvré.
      image: /images/destinations/tafiya/europe.jpg
  - discriminant: bookingForm
    value:
