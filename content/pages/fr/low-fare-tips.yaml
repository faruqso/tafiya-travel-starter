        - icon: /images/services/tafiya/icons/illustration-flights.svg
          title: Dates flexibles
          description: Décalez le départ d’un jour ou deux — les vols en milieu de semaine sont souvent 20 à 30 % moins chers sur les routes populaires.
          featured: false
        - icon: /images/services/tafiya/icons/illustration-events.svg
