    value:
      variant: compact
      eyebrow: Guides
      headline: Voyagez plus malin, dépensez moins
      subheadline: Dates flexibles, aéroports voisins et périodes inter-saison peuvent réduire fortement les tarifs.
      image: /images/destinations/tafiya/europe.jpg
  - discriminant: features
    value:
      eyebrow: Gains rapides
      headline: Quatre habitudes qui baissent les tarifs
