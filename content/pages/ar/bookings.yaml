  - discriminant: hero
    value:
      variant: compact
      eyebrow: حسابك
      headline: إدارة حجوزاتك
      subheadline: لوحة رحلاتك — سجّل الدخول لعرض السفر القادم وتنزيل المستندات وطلب التعديلات.
      image: /images/destinations/tafiya/rome.jpg
