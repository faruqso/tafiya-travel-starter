    value:
      variant: compact
      eyebrow: Flights
      headline: 600+ airline partners
      subheadline: One search across legacy carriers, low-cost airlines, and regional operators — with filters for alliance, cabin, and layovers.
      image: /images/destinations/tafiya/europe.jpg
      buttons:
        - label: Search flights
          href: /flights
          variant: primary
  - discriminant: features
    value:
      eyebrow: Search smarter
      headline: Find the right fare faster
      logoTickerLabel: Compare fares across leading carriers including
      logos:
        - image: /images/logos/tafiya/axon.png
          alt: Axon Airlines
          featured: false
        - image: /images/logos/tafiya/jetstar.png
          alt: Jetstar
