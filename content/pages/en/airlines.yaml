  - discriminant: textBlock
    value:
      eyebrow: Coverage
      headline: One search, every major carrier
      body: >-
        tafiya pulls live schedules and fares from full-service airlines, low-cost carriers, and regional operators across six continents. Filter by alliance, cabin, stops, or preferred airline — then compare the true cost of each fare before you book.


        Inventory updates in near real time. If a fare changes after you save a trip, we notify you so you can lock in the better price or adjust dates.


        For corporate or group bookings across multiple carriers, email groups@tafiya.co and our team will coordinate fares and seating together.
  - discriminant: cta
    value:
      headline: Ready to compare airlines?
      subheadline: Search live fares with alliance filters and all-in pricing — or learn how fees are shown before checkout.
      buttons:
        - label: Search flights
          href: /flights
          variant: primary
        - label: Understand airline fees
          href: /airline-fees
          variant: secondary
