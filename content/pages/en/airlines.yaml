          featured: false
      items:
        - icon: /images/services/tafiya/icons/illustration-flights.svg
          title: Alliance & airline filters
          description: Narrow results by Star Alliance, oneworld, SkyTeam, or your preferred carrier.
          featured: false
        - icon: /images/services/tafiya/icons/illustration-events.svg
          title: True cost comparison
          description: See baggage, seat selection, and change fees before you commit — not at the airport.
          featured: false
        - icon: /images/services/tafiya/icons/illustration-customization.svg
